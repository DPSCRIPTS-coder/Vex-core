<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEX Core | Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #2f81f7;
            --text-color: #c9d1d9;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: 0.5s;
        }

        .main-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        /* Título que serve de botão secreto */
        #secret-trigger {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 5px;
            user-select: none; /* Impede de selecionar o texto sem querer */
            -webkit-user-select: none;
        }

        input {
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .btn-access {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="preloader">
        <h1 style="letter-spacing: 8px;">VEX CORE</h1>
    </div>

    <div class="main-card">
        <h2 id="secret-trigger">VEX CORE</h2>
        <p style="color: #8b949e; font-size: 0.8rem; margin-bottom: 20px;">PAINEL MOBILE</p>

        <input type="text" placeholder="Número do RA">
        <input type="password" placeholder="Senha">

        <button class="btn-access">ENTRAR NO SISTEMA</button>
    </div>

    <script>
        // 1. Esconder Preloader
        setTimeout(() => {
            document.getElementById('preloader').style.display = 'none';
        }, 1500);

        // 2. LÓGICA DE DESTRUIÇÃO PARA TELEMÓVEL (Gatilho de cliques)
        let clickCount = 0;
        let lastClickTime = 0;

        document.getElementById('secret-trigger').addEventListener('click', function() {
            const currentTime = new Date().getTime();
            
            // Se o tempo entre cliques for maior que 500ms, reseta a contagem
            if (currentTime - lastClickTime > 500) {
                clickCount = 0;
            }

            clickCount++;
            lastClickTime = currentTime;

            // Se clicar 5 vezes seguidas rapidamente
            if (clickCount === 5) {
                localStorage.clear();
                sessionStorage.clear();
                document.body.innerHTML = `
                    <div style="background:black;color:#555;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;font-family:monospace;padding:20px;">
                        <div>
                            <h1 style="color:red;">[!] ERRO CRÍTICO</h1>
                            <p>Falha na integridade dos dados.<br>O sistema foi apagado por segurança.</p>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
